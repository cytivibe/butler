name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          build() {
            GOOS="$1" GOARCH="$2" go build -ldflags "-s -w" -o "dist/$3" .
          }
          build darwin  arm64 butler-macos-apple-silicon
          build darwin  amd64 butler-macos-intel
          build linux   amd64 butler-linux-x64
          build linux   arm64 butler-linux-arm64
          build windows amd64 butler-windows-x64.exe
          build windows arm64 butler-windows-arm64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
